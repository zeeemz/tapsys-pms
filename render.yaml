# Render Blueprint — provisions the web service + managed PostgreSQL in one step.
# In the Render dashboard: New + → Blueprint → connect this repo → Apply.
services:
  - type: web
    name: tapsys-pms
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tapsys-pms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_PASSWORD
        value: tapsys
      - key: NODE_VERSION
        value: "20"

databases:
  - name: tapsys-pms-db
    plan: free
    databaseName: tapsys_pms
    user: tapsys
